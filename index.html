<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Cup Pool 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --pitch-green: #1a5530;
            --pitch-green-dark: #103820;
            --pitch-green-deep: #0a2515;
            --gold: #d4af37;
            --gold-light: #e8cc6e;
            --cream: #f5f0e1;
            --cream-light: #faf7ef;
            --cream-dark: #e8e0ca;
            --board-white: #ffffff;
            --text-dark: #1a1a1a;
            --text-mid: #555;
            --text-light: #888;
            --border: #d0c9b5;
            --border-light: #e5dfd0;
            --score-red: #c0392b;
            --score-blue: #2874a6;

            --joe: #e74c3c;
            --mike: #3498db;
            --reed: #d4a017;
            --will: #27ae60;

            --joe-bg: rgba(231, 76, 60, 0.10);
            --mike-bg: rgba(52, 152, 219, 0.10);
            --reed-bg: rgba(212, 160, 23, 0.10);
            --will-bg: rgba(39, 174, 96, 0.10);
        }

        body {
            font-family: 'Source Serif 4', Georgia, serif;
            background: var(--cream);
            color: var(--text-dark);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        header {
            background: var(--pitch-green);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }

        .header-inner {
            max-width: 700px;
            margin: 0 auto;
            padding: 14px 16px;
            text-align: center;
        }

        .header-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header-logo {
            font-size: 26px;
            line-height: 1;
        }

        header h1 {
            font-family: 'Libre Baskerville', Georgia, serif;
            font-weight: 700;
            font-style: italic;
            font-size: 22px;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-family: 'Libre Baskerville', Georgia, serif;
            font-style: italic;
            font-size: 11px;
            color: rgba(255,255,255,0.65);
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .refresh-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            color: #fff;
            padding: 5px 16px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .refresh-btn:active { background: rgba(255,255,255,0.25); }

        .spinner {
            display: none;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .last-updated {
            font-size: 10px;
            color: rgba(255,255,255,0.55);
        }

        .status-banner {
            text-align: center;
            padding: 6px 16px;
            background: var(--cream-dark);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-mid);
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        /* ── Container ── */
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 10px 40px;
        }

        /* ── Section header ── */
        .section-header {
            background: var(--pitch-green);
            color: #fff;
            font-family: 'Libre Baskerville', Georgia, serif;
            font-weight: 700;
            font-style: italic;
            font-size: 16px;
            letter-spacing: 0.5px;
            text-align: center;
            padding: 9px 16px;
            margin-top: 14px;
            border-radius: 4px 4px 0 0;
        }

        .board {
            background: var(--board-white);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 4px 4px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            margin-bottom: 2px;
        }

        /* ── Owner cards (Pool Standings + Golden Boot) ── */
        .owner-card {
            border-bottom: 1px solid var(--border-light);
        }
        .owner-card:last-child { border-bottom: none; }

        .owner-header {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .owner-header:active { background: var(--cream-light); }

        .owner-rank {
            font-family: 'Source Serif 4', serif;
            font-weight: 900;
            font-size: 28px;
            line-height: 1;
            width: 30px;
            text-align: center;
            margin-right: 12px;
        }
        .rank-1 { color: var(--gold); }
        .rank-2 { color: #8a8a8a; }
        .rank-3 { color: #a67c52; }
        .rank-4 { color: #6b7a85; }

        .owner-info { flex: 1; min-width: 0; }
        .owner-name {
            font-family: 'Source Serif 4', serif;
            font-weight: 900;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .owner-name.team-joe { color: var(--joe); }
        .owner-name.team-mike { color: var(--mike); }
        .owner-name.team-reed { color: var(--reed); }
        .owner-name.team-will { color: var(--will); }

        .owner-detail {
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            color: var(--text-light);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1px;
        }

        .owner-stat { text-align: right; }
        .owner-stat-value {
            font-family: 'Source Serif 4', serif;
            font-weight: 900;
            font-size: 30px;
            line-height: 1;
        }
        .owner-stat-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 9px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-top: 2px;
        }

        .toggle-arrow {
            font-size: 10px;
            color: var(--text-light);
            transition: transform 0.3s ease;
            margin-left: 8px;
        }
        .owner-card.open .toggle-arrow { transform: rotate(180deg); }

        .owner-detail-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }
        .owner-card.open .owner-detail-panel { max-height: 800px; }

        /* Team / player row */
        .roster-row {
            display: flex;
            align-items: center;
            padding: 8px 14px;
            font-size: 13px;
            border-top: 1px solid var(--border-light);
        }
        .roster-row.eliminated { opacity: 0.35; text-decoration: line-through; text-decoration-color: rgba(192,57,43,0.4); }

        .roster-flag {
            width: 24px;
            text-align: center;
            font-size: 16px;
            margin-right: 8px;
        }
        .roster-name {
            flex: 1;
            font-family: 'Source Serif 4', serif;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .roster-cost {
            width: 50px;
            text-align: right;
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            color: var(--text-mid);
            font-weight: 600;
        }
        .roster-stat {
            width: 55px;
            text-align: right;
            font-family: 'Source Serif 4', serif;
            font-weight: 800;
            font-size: 14px;
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            margin-top: 18px;
            background: var(--board-white);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 6px;
            background: transparent;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
            cursor: pointer;
            border-right: 1px solid var(--border-light);
        }
        .tab-btn:last-child { border-right: none; }
        .tab-btn.active {
            background: var(--pitch-green);
            color: #fff;
        }

        .tab-panel {
            display: none;
            background: var(--board-white);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 4px 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            margin-top: 0;
        }
        .tab-panel.active { display: block; }

        /* ── Fixtures ── */
        .fixture-date-group {
            border-bottom: 1px solid var(--border-light);
        }
        .fixture-date-header {
            background: var(--cream-light);
            padding: 6px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-mid);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-light);
        }

        .fixture-row {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            min-height: 50px;
            gap: 8px;
        }
        .fixture-row:active { background: var(--cream-light); }
        .fixture-row:last-child { border-bottom: none; }

        .fixture-status {
            width: 56px;
            text-align: center;
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            color: var(--text-light);
            font-weight: 600;
            line-height: 1.2;
            flex-shrink: 0;
        }
        .fixture-status.live { color: var(--score-red); font-weight: 700; }

        .fixture-teams {
            flex: 1;
            font-family: 'Source Serif 4', serif;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            min-width: 0;
        }
        .fixture-team-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 1px 0;
        }
        .fixture-team-name { flex: 1; }
        .fixture-team-tag {
            font-family: 'DM Sans', sans-serif;
            font-size: 8px;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .tag-joe { background: var(--joe-bg); color: var(--joe); }
        .tag-mike { background: var(--mike-bg); color: var(--mike); }
        .tag-reed { background: var(--reed-bg); color: var(--reed); }
        .tag-will { background: var(--will-bg); color: var(--will); }

        .fixture-score {
            width: 28px;
            text-align: right;
            font-family: 'Source Serif 4', serif;
            font-weight: 900;
            font-size: 15px;
            flex-shrink: 0;
        }

        /* ── Groups ── */
        .group-card {
            border-bottom: 1px solid var(--border-light);
        }
        .group-card:last-child { border-bottom: none; }

        .group-header {
            background: var(--cream-light);
            padding: 6px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-mid);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
        }
        .group-header span { width: 24px; text-align: center; }
        .group-header span.team-label { flex: 1; text-align: left; }

        .group-row {
            display: flex;
            align-items: center;
            padding: 7px 14px;
            font-size: 12px;
            border-bottom: 1px solid var(--border-light);
        }
        .group-row:last-child { border-bottom: none; }
        .group-row.advancing { background: rgba(39, 174, 96, 0.06); }

        .group-pos {
            width: 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-light);
        }
        .group-team {
            flex: 1;
            font-family: 'Source Serif 4', serif;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .group-stat {
            width: 24px;
            text-align: center;
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-mid);
        }
        .group-pts {
            width: 24px;
            text-align: center;
            font-family: 'Source Serif 4', serif;
            font-weight: 800;
            font-size: 13px;
        }

        /* ── Bracket ── */
        .bracket-wrapper {
            padding: 14px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .bracket-rounds {
            display: flex;
            gap: 14px;
            min-width: max-content;
        }
        .bracket-round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            min-width: 140px;
        }
        .bracket-round-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 9px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            margin-bottom: 6px;
        }
        .bracket-match {
            border: 1px solid var(--border-light);
            border-radius: 4px;
            font-size: 11px;
            margin: 4px 0;
            background: #fff;
            cursor: pointer;
        }
        .bracket-match:active { background: var(--cream-light); }
        .bracket-match-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 8px;
            font-family: 'Source Serif 4', serif;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
        }
        .bracket-match-row + .bracket-match-row {
            border-top: 1px solid var(--border-light);
        }
        .bracket-match-row.tbd { color: var(--text-light); }

        /* ── Match details modal ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.72);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            align-items: flex-start;
            justify-content: center;
            overflow-y: auto;
            padding: 24px 10px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #fff;
            border-radius: 14px;
            width: 100%;
            max-width: 520px;
            margin: auto;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            animation: pop 0.22s cubic-bezier(0.4,0,0.2,1);
        }
        @keyframes pop { from { transform: translateY(12px) scale(0.96); opacity: 0; } to { transform: none; opacity: 1; } }
        .modal-header {
            background: var(--pitch-green);
            color: #fff;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title {
            font-family: 'Source Serif 4', serif;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
        }
        .modal-sub {
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            margin-top: 2px;
            letter-spacing: 0.5px;
        }
        .modal-close {
            background: rgba(255,255,255,0.15);
            border: none; color: #fff;
            width: 30px; height: 30px; border-radius: 50%;
            font-size: 22px; line-height: 1;
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            flex-shrink: 0; margin-left: 12px;
        }
        .modal-body { padding: 16px; }

        .match-score-block {
            text-align: center;
            margin-bottom: 16px;
            padding: 14px;
            background: var(--cream-light);
            border-radius: 8px;
        }
        .match-score-main {
            font-family: 'Source Serif 4', serif;
            font-weight: 900;
            font-size: 40px;
            line-height: 1.1;
        }
        .match-score-status {
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            color: var(--text-mid);
            font-weight: 600;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .match-team-row {
            display: flex;
            justify-content: space-between;
            font-family: 'Source Serif 4', serif;
            font-size: 13px;
            font-weight: 700;
            padding: 4px 0;
            text-transform: uppercase;
        }
        .match-info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--border-light);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
        }
        .match-info-row:last-child { border-bottom: none; }
        .match-info-label { color: var(--text-light); font-weight: 500; }
        .match-info-value { color: var(--text-dark); font-weight: 600; }
        .match-section {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .match-section-title {
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        /* ── Error / empty states ── */
        .empty-msg {
            text-align: center;
            padding: 30px 18px;
            color: var(--text-light);
            font-size: 13px;
            font-style: italic;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 16px 12px;
            font-size: 10px;
            color: var(--text-light);
            letter-spacing: 0.3px;
        }
        .footer-wordmark {
            font-family: 'Libre Baskerville', Georgia, serif;
            font-style: italic;
            color: var(--pitch-green);
            font-weight: 700;
        }

        /* ── Responsive ── */
        @media (min-width: 500px) {
            header h1 { font-size: 26px; }
            .container { padding: 0 16px 40px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="header-title">
                <span class="header-logo">⚽</span>
                <h1>World Cup Pool</h1>
            </div>
            <div class="subtitle">USA &middot; Canada &middot; Mexico &middot; 2026</div>
            <div class="header-controls">
                <button class="refresh-btn" onclick="fetchAll()">
                    <span id="refresh-text">Refresh</span>
                </button>
                <div class="spinner" id="spinner"></div>
                <span class="last-updated" id="last-updated"></span>
            </div>
        </div>
    </header>

    <div id="status-banner"></div>

    <div class="container">

        <div class="section-header">Pool Standings</div>
        <div class="board">
            <div id="pool-standings"></div>
        </div>

        <div class="section-header">Golden Boot</div>
        <div class="board">
            <div id="golden-boot"></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="fixtures">Fixtures</button>
            <button class="tab-btn" data-tab="groups">Groups</button>
            <button class="tab-btn" data-tab="bracket">Bracket</button>
        </div>

        <div id="fixtures-panel" class="tab-panel active">
            <div id="fixtures-list"></div>
        </div>
        <div id="groups-panel" class="tab-panel">
            <div id="groups-list"></div>
        </div>
        <div id="bracket-panel" class="tab-panel">
            <div id="bracket-view"></div>
        </div>

        <div class="footer">
            Auto-refreshes every 60 seconds &middot; Scores via ESPN &middot; Odds via Polymarket<br>
            <span class="footer-wordmark">World Cup Pool 2026</span>
        </div>
    </div>

    <!-- Match details modal -->
    <div class="modal-overlay" id="match-modal" onclick="closeMatch(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div>
                    <div class="modal-title" id="match-title"></div>
                    <div class="modal-sub" id="match-sub"></div>
                </div>
                <button class="modal-close" onclick="closeMatch()">&times;</button>
            </div>
            <div class="modal-body" id="match-body"></div>
        </div>
    </div>

    <script>
        // ── OWNERS + ROSTERS (2026 World Cup Pool) ──
        // Each owner: teams (with cost paid), and 5 Golden Boot players.
        // Mike also owns "the Field" — every team not explicitly owned by Joe/Reed/Will.
        const OWNERS = {
            'Joe': {
                color: 'joe', emoji: '🔴',
                teams: [
                    { name: 'France', cost: 78, search: ['france'], flag: '🇫🇷' },
                    { name: 'Colombia', cost: 10, search: ['colombia'], flag: '🇨🇴' },
                    { name: 'Mexico', cost: 5, search: ['mexico'], flag: '🇲🇽' },
                    { name: 'Japan', cost: 5, search: ['japan'], flag: '🇯🇵' },
                    { name: 'Sweden', cost: 2, search: ['sweden'], flag: '🇸🇪' }
                ],
                players: [
                    { name: 'Igor Thiago', search: ['igor thiago'] },
                    { name: 'Cristiano Ronaldo', search: ['cristiano ronaldo', 'ronaldo'] },
                    { name: 'Vinicius Junior', search: ['vinicius', 'vini'] },
                    { name: 'Harry Kane', search: ['harry kane'] },
                    { name: 'Michael Olise', search: ['olise'] }
                ]
            },
            'Mike': {
                color: 'mike', emoji: '🔵', ownsField: true,
                teams: [

                color: 'will', emoji: '🟢',

                    { name: 'Spain', cost: 81, search: ['spain'], flag: '🇪🇸' },

                ],
                players: [

                    { name: 'Romelu Lukaku', search: ['lukaku'] },
                    { name: 'Lionel Messi', search: ['messi'] }
                ]
            }
        };

        // Map ESPN/Polymarket team names → owner
        const TEAM_OWNER = {};  // populated on init
        const ALL_NAMED_TEAMS = new Set();
        for (const [ownerName, owner] of Object.entries(OWNERS)) {
            for (const t of owner.teams) {
                if (t.isField) continue;
                t.owner = ownerName;
                TEAM_OWNER[t.name.toLowerCase()] = ownerName;
                ALL_NAMED_TEAMS.add(t.name.toLowerCase());
            }
        }
        // Aliases (Polymarket / ESPN can use different names)
        const TEAM_ALIASES = {
            'united states': 'usa', 'u.s.a.': 'usa', 'united states of america': 'usa',
            'south korea': 'south korea', 'korea republic': 'south korea',
            'czechia': 'czech republic',
            'côte d\'ivoire': 'ivory coast', 'cote d\'ivoire': 'ivory coast'
        };
        function teamOwner(rawName) {
            const lower = (rawName || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
            const norm = TEAM_ALIASES[lower] || lower;
            if (TEAM_OWNER[norm]) return TEAM_OWNER[norm];
            // unowned named team → field bucket (Mike)
            return 'Mike-field';
        }

        // Build greedy name-match for Golden Boot players
        const playerEntries = [];
        for (const [ownerName, owner] of Object.entries(OWNERS)) {
            for (const p of owner.players) {
                p.owner = ownerName;
                for (const s of p.search) {
                    playerEntries.push({ term: s.toLowerCase(), owner: ownerName, playerDef: p });
                }
            }
        }
        playerEntries.sort((a, b) => b.term.length - a.term.length);
        function matchPlayer(rawName) {
            const lower = (rawName || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
            for (const e of playerEntries) {
                if (lower.includes(e.term)) return { owner: e.owner, playerDef: e.playerDef };
            }
            return null;
        }

        // ── STATE ──
        let teamOdds = {};         // teamNameLower -> probability (0-1) from Polymarket
        let fixtures = [];         // ESPN match list
        let groupsData = [];       // ESPN groups
        let goalScorers = {};      // playerNameLower -> { goals, owner }
        let openOwners = new Set(['Joe', 'Mike', 'Reed', 'Will', 'boot-Joe', 'boot-Mike', 'boot-Reed', 'boot-Will']);
        const CACHE_KEY_ESPN = 'wcp_espn_2026';
        const CACHE_KEY_POLY = 'wcp_poly_2026';

        // ── HELPERS ──
        function fmtPct(p) {
            if (p == null || isNaN(p)) return '--';
            const pct = p * 100;
            if (pct < 0.1) return '<0.1%';
            if (pct < 1) return pct.toFixed(1) + '%';
            return pct.toFixed(0) + '%';
        }
        function fmtMoney(n) { return '$' + n.toString(); }
        function colorClass(ownerName) {
            const c = OWNERS[ownerName];
            return c ? 'team-' + c.color : '';
        }
        function tagClass(ownerName) {
            const c = OWNERS[ownerName];
            return c ? 'tag-' + c.color : '';
        }

        // ── ESPN FETCH ──
        const ESPN_SCOREBOARD = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719';
        const ESPN_STANDINGS = 'https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings';

        async function fetchESPN() {
            try {
                const resp = await fetch(ESPN_SCOREBOARD, { signal: AbortSignal.timeout(15000) });
                if (!resp.ok) throw new Error('ESPN ' + resp.status);
                const raw = await resp.json();
                try { localStorage.setItem(CACHE_KEY_ESPN, JSON.stringify({ ts: Date.now(), data: raw })); } catch(e) {}
                return raw;
            } catch (e) {
                console.warn('ESPN fetch failed, trying cache:', e);
                try {
                    const c = JSON.parse(localStorage.getItem(CACHE_KEY_ESPN));
                    if (c && c.data) return c.data;
                } catch(_) {}
                return null;
            }
        }

        function parseFixtures(raw) {
            if (!raw || !raw.events) return [];
            return raw.events.map(ev => {
                try {
                    const comp = (ev.competitions && ev.competitions[0]) || {};
                    const competitors = comp.competitors || [];
                    const home = competitors.find(c => c.homeAway === 'home') || competitors[0] || {};
                    const away = competitors.find(c => c.homeAway === 'away') || competitors[1] || {};
                    const homeTeam = home.team || {};
                    const awayTeam = away.team || {};
                    const status = (comp.status && comp.status.type) || {};
                    return {
                        id: ev.id,
                        date: ev.date,
                        name: ev.name || (homeTeam.displayName + ' vs ' + awayTeam.displayName),
                        homeName: homeTeam.displayName || homeTeam.name || '?',
                        awayName: awayTeam.displayName || awayTeam.name || '?',
                        homeScore: home.score != null ? String(home.score) : '',
                        awayScore: away.score != null ? String(away.score) : '',
                        homeOwner: teamOwner(homeTeam.displayName || ''),
                        awayOwner: teamOwner(awayTeam.displayName || ''),
                        statusState: status.state || 'pre',
                        statusDetail: status.shortDetail || status.detail || '',
                        venue: (comp.venue && comp.venue.fullName) || '',
                        odds: comp.odds || []
                    };
                } catch (e) { return null; }
            }).filter(Boolean);
        }

        // ── POLYMARKET FETCH ──
        const POLY_WC_EVENT = 'https://gamma-api.polymarket.com/events?slug=world-cup-winner';

        async function fetchPolymarket() {
            try {
                const resp = await fetch(POLY_WC_EVENT, { signal: AbortSignal.timeout(15000) });
                if (!resp.ok) throw new Error('Polymarket ' + resp.status);
                const raw = await resp.json();
                try { localStorage.setItem(CACHE_KEY_POLY, JSON.stringify({ ts: Date.now(), data: raw })); } catch(e) {}
                return raw;
            } catch (e) {
                console.warn('Polymarket fetch failed, trying cache:', e);
                try {
                    const c = JSON.parse(localStorage.getItem(CACHE_KEY_POLY));
                    if (c && c.data) return c.data;
                } catch(_) {}
                return null;
            }
        }

        function parsePolymarket(raw) {
            // raw is an array of events; first is "World Cup Winner"
            const out = {};
            if (!raw || !raw[0]) return out;
            const markets = raw[0].markets || [];
            for (const m of markets) {
                if (!m.active || m.closed) continue;
                let prices;
                try { prices = typeof m.outcomePrices === 'string' ? JSON.parse(m.outcomePrices) : m.outcomePrices; } catch(e) { continue; }
                let outcomes;
                try { outcomes = typeof m.outcomes === 'string' ? JSON.parse(m.outcomes) : m.outcomes; } catch(e) { continue; }
                if (!prices || !outcomes) continue;
                // Find "Yes" probability
                const yesIdx = outcomes.findIndex(o => /yes/i.test(o));
                if (yesIdx < 0) continue;
                const yesPrice = parseFloat(prices[yesIdx]);
                if (isNaN(yesPrice)) continue;
                // Extract team name from question "Will X win the 2026 FIFA World Cup?"
                const q = m.question || '';
                const match = q.match(/^Will\s+(.+?)\s+win/i);
                if (!match) continue;
                const teamName = match[1].trim();
                out[teamName.toLowerCase()] = yesPrice;
            }
            return out;
        }

        // ── POOL ODDS CALC ──
        function calcOwnerOdds(ownerName) {
            const owner = OWNERS[ownerName];
            if (!owner) return 0;
            let total = 0;
            let allKnown = 0;
            // Sum probabilities of explicitly-owned teams
            for (const t of owner.teams) {
                if (t.isField) continue;
                const lower = t.name.toLowerCase();
                const prob = teamOdds[lower] || 0;
                total += prob;
            }
            // For Mike: add the Field probability (any team not explicitly owned by Joe/Reed/Will)
            if (owner.ownsField) {
                let nonFieldOdds = 0;
                for (const [oName, o] of Object.entries(OWNERS)) {
                    if (oName === 'Mike') continue;
                    for (const t of o.teams) {
                        if (t.isField) continue;
                        nonFieldOdds += teamOdds[t.name.toLowerCase()] || 0;
                    }
                }
                // Field = total prob mass MINUS named teams owned by others MINUS Mike's named teams
                // i.e. Field = 1 - (everyone's named odds)
                let allNamedOdds = nonFieldOdds;
                for (const t of owner.teams) {
                    if (t.isField) continue;
                    allNamedOdds += teamOdds[t.name.toLowerCase()] || 0;
                }
                const fieldProb = Math.max(0, 1 - allNamedOdds);
                total += fieldProb;
            }
            return total;
        }

        // ── RENDER: POOL STANDINGS ──
        function renderPoolStandings() {
            const el = document.getElementById('pool-standings');
            const entries = Object.entries(OWNERS).map(([name, o]) => ({
                name, owner: o, odds: calcOwnerOdds(name)
            }));
            entries.sort((a, b) => b.odds - a.odds);

            el.innerHTML = entries.map((e, idx) => {
                const rank = idx + 1;
                const isOpen = openOwners.has(e.name);
                const totalSpent = e.owner.teams.reduce((s, t) => s + t.cost, 0);
                const teamRows = e.owner.teams.map(t => {
                    const prob = t.isField ? Math.max(0, 1 - sumAllNamedOwnedOdds()) : (teamOdds[t.name.toLowerCase()] || 0);
                    return `
                        <div class="roster-row">
                            <div class="roster-flag">${t.flag || '⚽'}</div>
                            <div class="roster-name">${t.name}</div>
                            <div class="roster-cost">${fmtMoney(t.cost)}</div>
                            <div class="roster-stat">${fmtPct(prob)}</div>
                        </div>`;
                }).join('');
                return `
                    <div class="owner-card ${isOpen ? 'open' : ''}" id="pool-card-${e.name}">
                        <div class="owner-header" onclick="toggleOwner('${e.name}')">
                            <div class="owner-rank rank-${rank}">${rank}</div>
                            <div class="owner-info">
                                <div class="owner-name ${colorClass(e.name)}">${e.name}</div>
                                <div class="owner-detail">${e.owner.teams.length} teams &middot; ${fmtMoney(totalSpent)} spent</div>
                            </div>
                            <div class="owner-stat">
                                <div class="owner-stat-value ${colorClass(e.name)}">${fmtPct(e.odds)}</div>
                                <div class="owner-stat-label">Win Odds</div>
                            </div>
                            <span class="toggle-arrow">&#9660;</span>
                        </div>
                        <div class="owner-detail-panel">${teamRows}</div>
                    </div>`;
            }).join('');
        }

        function sumAllNamedOwnedOdds() {
            let s = 0;
            for (const owner of Object.values(OWNERS)) {
                for (const t of owner.teams) {
                    if (t.isField) continue;
                    s += teamOdds[t.name.toLowerCase()] || 0;
                }
            }
            return s;
        }

        // ── RENDER: GOLDEN BOOT ──
        function renderGoldenBoot() {
            const el = document.getElementById('golden-boot');
            const entries = Object.entries(OWNERS).map(([name, o]) => {
                const playerData = o.players.map(p => {
                    const goals = goalScorers[p.name.toLowerCase()] || 0;
                    return { name: p.name, goals };
                });
                playerData.sort((a, b) => b.goals - a.goals);
                const totalGoals = playerData.reduce((s, p) => s + p.goals, 0);
                return { name, owner: o, players: playerData, totalGoals };
            });
            // Find the leader (most goals from a single player) per owner
            entries.forEach(e => {
                e.topGoals = e.players[0] ? e.players[0].goals : 0;
            });
            entries.sort((a, b) => b.topGoals - a.topGoals || b.totalGoals - a.totalGoals);

            el.innerHTML = entries.map((e, idx) => {
                const rank = idx + 1;
                const isOpen = openOwners.has('boot-' + e.name);
                const playerRows = e.players.map(p => `
                    <div class="roster-row">
                        <div class="roster-flag">⚽</div>
                        <div class="roster-name">${p.name}</div>
                        <div class="roster-stat">${p.goals}</div>
                    </div>`).join('');
                return `
                    <div class="owner-card ${isOpen ? 'open' : ''}" id="boot-card-${e.name}">
                        <div class="owner-header" onclick="toggleOwner('boot-${e.name}')">
                            <div class="owner-rank rank-${rank}">${rank}</div>
                            <div class="owner-info">
                                <div class="owner-name ${colorClass(e.name)}">${e.name}</div>
                                <div class="owner-detail">Top scorer: ${e.players[0] ? e.players[0].name + ' (' + e.players[0].goals + ')' : '—'}</div>
                            </div>
                            <div class="owner-stat">
                                <div class="owner-stat-value ${colorClass(e.name)}">${e.totalGoals}</div>
                                <div class="owner-stat-label">Goals</div>
                            </div>
                            <span class="toggle-arrow">&#9660;</span>
                        </div>
                        <div class="owner-detail-panel">${playerRows}</div>
                    </div>`;
            }).join('');
        }

        function toggleOwner(key) {
            if (openOwners.has(key)) openOwners.delete(key);
            else openOwners.add(key);
            const id = key.startsWith('boot-') ? 'boot-card-' + key.slice(5) : 'pool-card-' + key;
            const el = document.getElementById(id);
            if (el) el.classList.toggle('open');
        }

        // ── RENDER: FIXTURES ──
        function renderFixtures() {
            const el = document.getElementById('fixtures-list');
            if (!fixtures.length) {
                el.innerHTML = '<div class="empty-msg">Tournament begins June 11. Fixtures will appear when ESPN publishes them.</div>';
                return;
            }
            // Group by date
            const byDate = {};
            for (const f of fixtures) {
                const d = f.date ? f.date.slice(0,10) : 'TBD';
                if (!byDate[d]) byDate[d] = [];
                byDate[d].push(f);
            }
            const dates = Object.keys(byDate).sort();
            el.innerHTML = dates.map(d => {
                const dateLabel = d === 'TBD' ? 'TBD' : new Date(d).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                const rows = byDate[d].map(f => {
                    const isLive = f.statusState === 'in';
                    const isPost = f.statusState === 'post';
                    let status = f.statusDetail || '';
                    if (!isPost && !isLive && f.date) {
                        const dt = new Date(f.date);
                        status = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                    }
                    const homeTagged = f.homeOwner && f.homeOwner !== 'Mike-field';
                    const awayTagged = f.awayOwner && f.awayOwner !== 'Mike-field';
                    const homeTag = homeTagged ? `<span class="fixture-team-tag ${tagClass(f.homeOwner)}">${f.homeOwner}</span>` : '';
                    const awayTag = awayTagged ? `<span class="fixture-team-tag ${tagClass(f.awayOwner)}">${f.awayOwner}</span>` : '';
                    const showScore = isPost || isLive;
                    return `
                        <div class="fixture-row" onclick='showMatch(${JSON.stringify(f.id)})'>
                            <div class="fixture-status ${isLive ? 'live' : ''}">${status || '&nbsp;'}</div>
                            <div class="fixture-teams">
                                <div class="fixture-team-row">
                                    <span class="fixture-team-name">${f.homeName}</span>
                                    ${homeTag}
                                </div>
                                <div class="fixture-team-row">
                                    <span class="fixture-team-name">${f.awayName}</span>
                                    ${awayTag}
                                </div>
                            </div>
                            <div class="fixture-score">${showScore ? (f.homeScore || '0') + '<br>' + (f.awayScore || '0') : ''}</div>

                }).join('');
                return `
                    <div class="fixture-date-group">
                        <div class="fixture-date-header">${dateLabel}</div>
                        ${rows}
                    </div>`;
            }).join('');
        }

        // ── MATCH MODAL ──
        function showMatch(id) {
            const f = fixtures.find(x => x.id === id);
            if (!f) return;
            document.getElementById('match-title').textContent = f.homeName + ' vs ' + f.awayName;
            document.getElementById('match-sub').innerHTML = (f.venue || 'Venue TBD') + ' &middot; ' + (f.statusDetail || '');
            const body = document.getElementById('match-body');
            const isPost = f.statusState === 'post';
            const isLive = f.statusState === 'in';
            const showScore = isPost || isLive;

            const odds = f.odds && f.odds[0];
            const oddsHtml = odds ? `
                <div class="match-section">
                    <div class="match-section-title">Odds &middot; ${odds.provider ? odds.provider.displayName : ''}</div>
                    ${odds.homeTeamOdds ? '<div class="match-info-row"><div class="match-info-label">' + f.homeName + '</div><div class="match-info-value">' + (odds.homeTeamOdds.moneyLine || '--') + '</div></div>' : ''}
                    ${odds.drawOdds ? '<div class="match-info-row"><div class="match-info-label">Draw</div><div class="match-info-value">' + (odds.drawOdds.moneyLine || '--') + '</div></div>' : ''}
                    ${odds.awayTeamOdds ? '<div class="match-info-row"><div class="match-info-label">' + f.awayName + '</div><div class="match-info-value">' + (odds.awayTeamOdds.moneyLine || '--') + '</div></div>' : ''}
                    ${odds.overUnder ? '<div class="match-info-row"><div class="match-info-label">Total goals (O/U)</div><div class="match-info-value">' + odds.overUnder + '</div></div>' : ''}
                </div>` : '';

            body.innerHTML = `
                <div class="match-score-block">
                    ${showScore ? `<div class="match-score-main">${f.homeScore || 0} &ndash; ${f.awayScore || 0}</div>` : '<div class="match-score-main" style="font-size:20px;color:var(--text-mid);">Scheduled</div>'}
                    <div class="match-score-status">${f.statusDetail || ''}</div>
                </div>
                <div class="match-section">
                    <div class="match-section-title">Match Info</div>
                    <div class="match-info-row"><div class="match-info-label">Date</div><div class="match-info-value">${f.date ? new Date(f.date).toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' }) : 'TBD'}</div></div>
                    ${f.venue ? '<div class="match-info-row"><div class="match-info-label">Venue</div><div class="match-info-value">' + f.venue + '</div></div>' : ''}
                    ${f.homeOwner !== 'Mike-field' ? '<div class="match-info-row"><div class="match-info-label">' + f.homeName + ' owned by</div><div class="match-info-value">' + f.homeOwner + '</div></div>' : ''}
                    ${f.awayOwner !== 'Mike-field' ? '<div class="match-info-row"><div class="match-info-label">' + f.awayName + ' owned by</div><div class="match-info-value">' + f.awayOwner + '</div></div>' : ''}
                </div>
                ${oddsHtml}`;
            document.getElementById('match-modal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeMatch(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('match-modal').classList.remove('open');
            document.body.style.overflow = '';
        }

        // ── TABS ──
        document.addEventListener('click', e => {
            if (e.target.classList.contains('tab-btn')) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById(e.target.dataset.tab + '-panel').classList.add('active');
            }
        });

        // ── MAIN FETCH ──
        async function fetchAll() {
            const spinner = document.getElementById('spinner');
            const refreshText = document.getElementById('refresh-text');
            spinner.style.display = 'inline-block';
            refreshText.textContent = 'Loading';

            const [espnRaw, polyRaw] = await Promise.all([fetchESPN(), fetchPolymarket()]);

            if (espnRaw) {
                fixtures = parseFixtures(espnRaw);
            }
            if (polyRaw) {
                teamOdds = parsePolymarket(polyRaw);
            }

            // Render
            renderPoolStandings();
            renderGoldenBoot();
            renderFixtures();
            renderGroups();
            renderBracket();

            const banner = document.getElementById('status-banner');
            if (!espnRaw && !polyRaw) {
                banner.className = 'status-banner';
                banner.textContent = 'Live data unavailable — showing placeholder content';
            } else if (!fixtures.length) {
                banner.className = 'status-banner';
                banner.textContent = 'Preview Mode — Tournament begins June 11, 2026';
            } else {
                banner.className = '';
                banner.textContent = '';
            }

            document.getElementById('last-updated').textContent =
                'Updated ' + new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            spinner.style.display = 'none';
            refreshText.textContent = 'Refresh';
        }

        // ── INIT ──
        fetchAll();
        let refreshInterval = setInterval(fetchAll, 60000);
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                clearInterval(refreshInterval);
            } else {
                fetchAll();
                refreshInterval = setInterval(fetchAll, 60000);
            }
        });
    </script>
</body>
</html>
