<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Cup Pool 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* World Cup brand: deep navy + gold accent (FIFA broadcast palette) */
            --brand-navy: #1a2342;
            --brand-navy-dark: #11172f;
            --brand-navy-deep: #080c1e;
            --brand-gold: #f5c63b;
            --brand-gold-bright: #ffd700;
            --brand-red: #c8102e;

            --cream: #f5f0e1;
            --cream-light: #faf7ef;
            --cream-dark: #e8e0ca;
            --board-white: #ffffff;
            --text-dark: #1a1a1a;
            --text-mid: #555;
            --text-light: #888;
            --border: #d0c9b5;
            --border-light: #e5dfd0;
            --score-red: #c0392b;
            --score-blue: #2874a6;

            --joe: #e74c3c;
            --mike: #3498db;
            --reed: #d4a017;
            --will: #27ae60;

            --joe-bg: rgba(231, 76, 60, 0.10);
            --mike-bg: rgba(52, 152, 219, 0.10);
            --reed-bg: rgba(212, 160, 23, 0.10);
            --will-bg: rgba(39, 174, 96, 0.10);
        }

        body {
            font-family: 'Source Serif 4', Georgia, serif;
            background: var(--cream);
            color: var(--text-dark);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        header {
            background: linear-gradient(135deg, var(--brand-navy) 0%, var(--brand-navy-dark) 100%);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            border-bottom: 2px solid var(--brand-gold);
        }

        .header-inner {
            max-width: 700px;
            margin: 0 auto;
            padding: 14px 16px 10px;
            text-align: center;
        }

        .header-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header-logo-img {
            height: 44px;
            width: auto;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
        }

        header h1 {
            font-family: 'Libre Baskerville', Georgia, serif;
            font-weight: 700;
            font-style: italic;
            font-size: 22px;
            color: var(--brand-gold);
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-family: 'Libre Baskerville', Georgia, serif;
            font-style: italic;
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            margin-top: 2px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .refresh-btn {
            background: rgba(245, 198, 59, 0.12);
            border: 1px solid rgba(245, 198, 59, 0.4);
            color: var(--brand-gold);
            padding: 5px 16px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .refresh-btn:active { background: rgba(245, 198, 59, 0.3); }

        .spinner {
            display: none;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(245, 198, 59, 0.3);
            border-top-color: var(--brand-gold);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .last-updated {
            font-size: 10px;
            color: rgba(255,255,255,0.55);
        }

        /* ── Main view tabs (Games / Goals) ── */
        .main-tabs {
            background: var(--brand-navy-dark);
            display: flex;
            border-bottom: 1px solid var(--brand-navy-deep);
            position: sticky;
            top: 86px;
            z-index: 99;
        }
        .main-tab-btn {
            flex: 1;
            padding: 12px 8px;
            background: transparent;
            border: none;
            font-family: 'Libre Baskerville', Georgia, serif;
            font-style: italic;
            font-weight: 700;
            font-size: 15px;
            color: rgba(255,255,255,0.55);
            cursor: pointer;
            letter-spacing: 1px;
            transition: color 0.2s, background 0.2s;
            text-transform: uppercase;
        }
        .main-tab-btn.active {
            color: var(--brand-gold);
            background: var(--brand-navy);
            box-shadow: inset 0 -3px 0 var(--brand-gold);
        }

        .status-banner {
            text-align: center;
            padding: 6px 16px;
            background: var(--cream-dark);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-mid);
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 10px 40px;
        }

        .view { display: none; }
        .view.active { display: block; }

        /* ── Section header ── */
        .section-header {
            background: var(--brand-navy);
            color: var(--brand-gold);
            font-family: 'Libre Baskerville', Georgia, serif;
            font-weight: 700;
            font-style: italic;
            font-size: 16px;
            letter-spacing: 0.5px;
            text-align: center;
            padding: 9px 16px;
            margin-top: 14px;
            border-radius: 4px 4px 0 0;
            border-bottom: 2px solid var(--brand-gold);
        }

        .board {
            background: var(--board-white);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 4px 4px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            margin-bottom: 2px;
        }

        /* ── Owner cards ── */
        .owner-card { border-bottom: 1px solid var(--border-light); }
        .owner-card:last-child { border-bottom: none; }

        /* Thicker visual separator between owners on Pool Standings only */
        #pool-standings .owner-card {
            border-bottom: 5px solid var(--cream-dark);
        }
        #pool-standings .owner-card:last-child {
            border-bottom: none;
        }

        .owner-header {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .owner-header:active { background: var(--cream-light); }

        .owner-rank {
            font-family: 'Source Serif 4', serif;
            font-weight: 900;
            font-size: 28px;
            line-height: 1;
            width: 30px;
            text-align: center;
            margin-right: 12px;
        }
        .rank-1 { color: var(--brand-gold); }
        .rank-2 { color: #8a8a8a; }
        .rank-3 { color: #a67c52; }
        .rank-4 { color: #6b7a85; }

        .owner-info { flex: 1; min-width: 0; }
        .owner-name {
            font-family: 'Source Serif 4', serif;
            font-weight: 900;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .owner-name.team-joe { color: var(--joe); }
        .owner-name.team-mike { color: var(--mike); }
        .owner-name.team-reed { color: var(--reed); }
        .owner-name.team-will { color: var(--will); }

        .owner-detail {
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            color: var(--text-light);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .owner-stat { text-align: right; }
        .owner-stat-value {
            font-family: 'Source Serif 4', serif;
            font-weight: 900;
            font-size: 30px;
            line-height: 1;
        }
        .owner-stat-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 9px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-top: 2px;
        }

        .toggle-arrow {
            font-size: 10px;
            color: var(--text-light);
            transition: transform 0.3s ease;
            margin-left: 8px;
        }
        .owner-card.open .toggle-arrow { transform: rotate(180deg); }

        .owner-detail-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }
        .owner-card.open .owner-detail-panel { max-height: 1200px; }

        .roster-row {
            display: flex;
            align-items: center;
            padding: 8px 14px;
            font-size: 13px;
            border-top: 1px solid var(--border-light);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .roster-row:active { background: var(--cream-light); }
        .roster-row.field-bucket { cursor: default; opacity: 0.85; font-style: italic; }
        .roster-row.eliminated { opacity: 0.35; text-decoration: line-through; text-decoration-color: rgba(192,57,43,0.4); }

        .roster-flag {
            width: 24px;
            text-align: center;
            font-size: 16px;
            margin-right: 8px;
        }
        .roster-name {
            flex: 1;
            font-family: 'Source Serif 4', serif;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .roster-cost {
            width: 44px;
            text-align: right;
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            color: var(--text-mid);
            font-weight: 600;
        }
        .roster-stat {
            width: 55px;
            text-align: right;
            font-family: 'Source Serif 4', serif;
            font-weight: 800;
            font-size: 14px;
        }

        /* ── Sub-tabs (Fixtures / Groups / Bracket inside Games) ── */
        .sub-tabs {
            display: flex;
            margin-top: 18px;
            background: var(--board-white);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .sub-tab-btn {
            flex: 1;
            padding: 10px 6px;
            background: transparent;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-light);
            cursor: pointer;
            border-right: 1px solid var(--border-light);
        }
        .sub-tab-btn:last-child { border-right: none; }
        .sub-tab-btn.active {
            background: var(--brand-navy);
            color: var(--brand-gold);
        }

        .sub-panel {
            display: none;
            background: var(--board-white);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 4px 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .sub-panel.active { display: block; }

        /* ── Fixtures ── */
        .fixture-date-group { border-bottom: 1px solid var(--border-light); }
        .fixture-date-header {
            background: var(--cream-light);
            padding: 6px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-mid);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-light);
        }

        .fixture-row {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            min-height: 50px;
            gap: 8px;
        }
        .fixture-row:active { background: var(--cream-light); }
        .fixture-row:last-child { border-bottom: none; }

        .fixture-status {
            width: 64px;
            text-align: center;
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            color: var(--text-light);
            font-weight: 600;
            line-height: 1.2;
            flex-shrink: 0;
        }
        .fixture-status.live { color: var(--score-red); font-weight: 700; }
        .fixture-venue {
            font-size: 9px;
            font-style: italic;
            color: var(--text-light);
            margin-top: 2px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Eliminated team styling — grey + strikethrough */
        .team-eliminated { opacity: 0.4; }
        .team-eliminated .fixture-team-name,
        .team-eliminated .group-team-name,
        .team-eliminated .roster-name {
            text-decoration: line-through;
            text-decoration-color: rgba(192,57,43,0.5);
        }

        .fixture-teams {
            flex: 1;
            font-family: 'Source Serif 4', serif;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            min-width: 0;
        }
        .fixture-team-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 1px 0;
        }
        .fixture-team-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }
        .fixture-team-tag {
            font-family: 'DM Sans', sans-serif;
            font-size: 8px;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: 700;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .tag-joe { background: var(--joe-bg); color: var(--joe); }
        .tag-mike { background: var(--mike-bg); color: var(--mike); }
        .tag-reed { background: var(--reed-bg); color: var(--reed); }
        .tag-will { background: var(--will-bg); color: var(--will); }

        .fixture-score {
            width: 28px;
            text-align: right;
            font-family: 'Source Serif 4', serif;
            font-weight: 900;
            font-size: 15px;
            flex-shrink: 0;
            line-height: 1.3;
        }

        /* ── Groups ── */
        .group-card { border-bottom: 1px solid var(--border-light); }
        .group-card:last-child { border-bottom: none; }

        .group-header {
            background: var(--cream-light);
            padding: 6px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-mid);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            gap: 4px;
        }
        .group-header span { width: 24px; text-align: center; flex-shrink: 0; }
        .group-header span.team-label { flex: 1; text-align: left; width: auto; }

        .group-row {
            display: flex;
            align-items: center;
            padding: 7px 14px;
            font-size: 12px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            gap: 4px;
        }
        .group-row:active { background: var(--cream-light); }
        .group-row:last-child { border-bottom: none; }
        .group-row.advancing { background: rgba(245, 198, 59, 0.06); }

        .group-pos {
            width: 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-light);
            flex-shrink: 0;
        }
        .group-team {
            flex: 1;
            font-family: 'Source Serif 4', serif;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }
        .group-team-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }
        .group-stat {
            width: 24px;
            text-align: center;
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-mid);
            flex-shrink: 0;
        }
        .group-pts {
            width: 24px;
            text-align: center;
            font-family: 'Source Serif 4', serif;
            font-weight: 800;
            font-size: 13px;
            flex-shrink: 0;
        }

        /* ── Bracket ── */
        .bracket-wrapper {
            padding: 14px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .bracket-rounds {
            display: flex;
            gap: 14px;
            min-width: max-content;
        }
        .bracket-round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            min-width: 140px;
        }
        .bracket-round-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 9px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            margin-bottom: 6px;
        }
        .bracket-match {
            border: 1px solid var(--border-light);
            border-radius: 4px;
            font-size: 11px;
            margin: 4px 0;
            background: #fff;
            cursor: pointer;
            position: relative;
        }
        .bracket-match:active { background: var(--cream-light); }
        .bracket-match-num {
            position: absolute;
            top: -7px;
            left: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 8px;
            font-weight: 700;
            color: var(--text-light);
            background: #fff;
            padding: 0 4px;
            letter-spacing: 0.5px;
        }
        .bracket-match-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            font-family: 'Source Serif 4', serif;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
        }
        .bracket-match-row + .bracket-match-row {
            border-top: 1px solid var(--border-light);
        }
        .bracket-match-row.tbd { color: var(--text-light); font-style: italic; font-size: 10px; }

        /* ── Top scorers (Goals view) ── */
        .scorer-row {
            display: flex;
            align-items: center;
            padding: 8px 14px;
            font-size: 13px;
            border-bottom: 1px solid var(--border-light);
        }
        .scorer-row:last-child { border-bottom: none; }
        .scorer-rank {
            width: 24px;
            font-family: 'Source Serif 4', serif;
            font-weight: 800;
            font-size: 13px;
            color: var(--text-light);
        }
        .scorer-name {
            flex: 1;
            font-family: 'Source Serif 4', serif;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
        }
        .scorer-goals {
            font-family: 'Source Serif 4', serif;
            font-weight: 900;
            font-size: 16px;
            color: var(--brand-red);
        }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.72);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            align-items: flex-start;
            justify-content: center;
            overflow-y: auto;
            padding: 24px 10px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #fff;
            border-radius: 14px;
            width: 100%;
            max-width: 520px;
            margin: auto;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            animation: pop 0.22s cubic-bezier(0.4,0,0.2,1);
        }
        @keyframes pop { from { transform: translateY(12px) scale(0.96); opacity: 0; } to { transform: none; opacity: 1; } }
        .modal-header {
            background: linear-gradient(135deg, var(--brand-navy) 0%, var(--brand-navy-dark) 100%);
            color: #fff;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--brand-gold);
        }
        .modal-title {
            font-family: 'Source Serif 4', serif;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            color: var(--brand-gold);
        }
        .modal-sub {
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            margin-top: 2px;
            letter-spacing: 0.5px;
        }
        .modal-close {
            background: rgba(245,198,59,0.15);
            border: 1px solid rgba(245,198,59,0.3);
            color: var(--brand-gold);
            width: 30px; height: 30px; border-radius: 50%;
            font-size: 22px; line-height: 1;
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            flex-shrink: 0; margin-left: 12px;
            padding: 0;
        }
        .modal-body { padding: 16px; max-height: 70vh; overflow-y: auto; }

        .match-score-block {
            text-align: center;
            margin-bottom: 16px;
            padding: 14px;
            background: var(--cream-light);
            border-radius: 8px;
        }
        .match-score-main {
            font-family: 'Source Serif 4', serif;
            font-weight: 900;
            font-size: 40px;
            line-height: 1.1;
        }
        .match-score-status {
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            color: var(--text-mid);
            font-weight: 600;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .match-info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--border-light);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
        }
        .match-info-row:last-child { border-bottom: none; }
        .match-info-label { color: var(--text-light); font-weight: 500; }
        .match-info-value { color: var(--text-dark); font-weight: 600; }
        .match-section {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .match-section-title {
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-light);

    <script>
        // ── OWNERS + ROSTERS ──
        const OWNERS = {
            'Joe': {
                color: 'joe',
                teams: [
                    { name: 'France', cost: 78, flag: '🇫🇷' },
                    { name: 'Colombia', cost: 10, flag: '🇨🇴' },
                    { name: 'Mexico', cost: 5, flag: '🇲🇽' },
                    { name: 'Japan', cost: 5, flag: '🇯🇵' },
                    { name: 'Sweden', cost: 2, flag: '🇸🇪' }
                ],
                players: [
                    { name: 'Igor Thiago', search: ['igor thiago'] },
                    { name: 'Cristiano Ronaldo', search: ['cristiano ronaldo', 'ronaldo'] },
                    { name: 'Vinicius Junior', search: ['vinicius', 'vini'] },
                    { name: 'Harry Kane', search: ['harry kane'] },
                    { name: 'Michael Olise', search: ['olise'] }
                ]
            },
            'Mike': {
                color: 'mike', ownsField: true,
                teams: [
                    { name: 'Brazil', cost: 13, flag: '🇧🇷' },
                    { name: 'Norway', cost: 11, flag: '🇳🇴' },
                    { name: 'Argentina', cost: 13, flag: '🇦🇷' },
                    { name: 'Netherlands', cost: 13, flag: '🇳🇱' },
                    { name: 'Germany', cost: 12, flag: '🇩🇪' },
                    { name: 'Belgium', cost: 7, flag: '🇧🇪' },
                    { name: 'Morocco', cost: 2, flag: '🇲🇦' },
                    { name: 'The Field', cost: 29, flag: '🌍', isField: true }
                ],
                players: [
                    { name: 'Erling Haaland', search: ['haaland'] },
                    { name: 'Nick Woltemade', search: ['woltemade'] },
                    { name: 'Kai Havertz', search: ['havertz'] },
                    { name: 'Lamine Yamal', search: ['yamal'] },
                    { name: 'Lautaro Martínez', search: ['lautaro', 'lautaro martinez'] }
                ]
            },
            'Reed': {
                color: 'reed',
                teams: [
                    { name: 'England', cost: 60, flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
                    { name: 'Portugal', cost: 40, flag: '🇵🇹' }
                ],
                players: [
                    { name: 'Florian Wirtz', search: ['wirtz'] },
                    { name: 'Kylian Mbappé', search: ['mbappe', 'mbappé'] },
                    { name: 'Mikel Oyarzabal', search: ['oyarzabal'] },
                    { name: 'Raphinha', search: ['raphinha'] },
                    { name: 'Julián Álvarez', search: ['alvarez', 'julian alvarez', 'álvarez'] }
                ]
            },
            'Will': {
                color: 'will',
                teams: [
                    { name: 'Spain', cost: 81, flag: '🇪🇸' },
                    { name: 'USA', cost: 13, flag: '🇺🇸' },
                    { name: 'Switzerland', cost: 6, flag: '🇨🇭' }
                ],
                players: [
                    { name: 'Ousmane Dembélé', search: ['dembele', 'dembélé'] },
                    { name: 'Ferran Torres', search: ['ferran torres'] },
                    { name: 'Cody Gakpo', search: ['gakpo'] },
                    { name: 'Romelu Lukaku', search: ['lukaku'] },
                    { name: 'Lionel Messi', search: ['messi'] }
                ]
            }
        };

        const TEAM_OWNER = {};
        for (const [ownerName, owner] of Object.entries(OWNERS)) {
            for (const t of owner.teams) {
                if (t.isField) continue;
                t.owner = ownerName;
                TEAM_OWNER[t.name.toLowerCase()] = ownerName;
            }
        }
        // The canonical name for each team is the spelling used in GROUPS / the owner rosters.
        // ESPN, FIFA, and Polymarket each spell some countries differently, so every known
        // variant is mapped to its canonical here. Keys MUST be lowercase + accent-stripped,
        // because normalizeTeam() strips accents BEFORE doing this lookup — an accented key
        // (e.g. 'côte d'ivoire') can never match and is dead.
        const TEAM_ALIASES = {
            // USA  (ESPN short form is "USA"; FIFA long form is "United States")
            'united states': 'usa', 'united states of america': 'usa', 'u.s.a.': 'usa',
            // South Korea  (FIFA: "Korea Republic")
            'korea republic': 'south korea', 'republic of korea': 'south korea',
            'rep. of korea': 'south korea', 'korea, republic of': 'south korea',
            // Czech Republic  (FIFA/ESPN: "Czechia")
            'czechia': 'czech republic',
            // Ivory Coast  (FIFA: "Côte d'Ivoire" — straight and curly apostrophe variants)
            'cote d\'ivoire': 'ivory coast', 'cote d’ivoire': 'ivory coast',
            // Turkey  (FIFA/ESPN: "Türkiye" -> stripped to "turkiye")
            'turkiye': 'turkey',
            // Bosnia and Herzegovina
            'bosnia & herzegovina': 'bosnia and herzegovina',
            'bosnia-herzegovina': 'bosnia and herzegovina',
            'bosnia herzegovina': 'bosnia and herzegovina',
            'bosnia': 'bosnia and herzegovina',
            // Iran  (FIFA: "IR Iran")
            'ir iran': 'iran',
            // Cape Verde  (FIFA: "Cabo Verde")
            'cabo verde': 'cape verde',
            // DR Congo  (FIFA: "Congo DR")
            'congo dr': 'dr congo', 'dr. congo': 'dr congo', 'congo-kinshasa': 'dr congo',
            'democratic republic of the congo': 'dr congo',
            'democratic republic of congo': 'dr congo',
            'congo democratic republic': 'dr congo'
        };
        function normalizeTeam(name) {
            const lower = (name || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
            return TEAM_ALIASES[lower] || lower;
        }
        function teamOwner(name) {
            const norm = normalizeTeam(name);
            return TEAM_OWNER[norm] || 'Mike';  // anything unowned belongs to Mike via the Field
        }
        function isFieldTeam(name) {
            return !TEAM_OWNER[normalizeTeam(name)];
        }

        const playerEntries = [];
        for (const [ownerName, owner] of Object.entries(OWNERS)) {
            for (const p of owner.players) {
                p.owner = ownerName;
                for (const s of p.search) {
                    playerEntries.push({ term: s.toLowerCase(), owner: ownerName, playerDef: p });
                }
            }
        }
        playerEntries.sort((a, b) => b.term.length - a.term.length);
        function matchPlayer(rawName) {
            const lower = (rawName || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
            for (const e of playerEntries) {
                if (lower.includes(e.term)) return { owner: e.owner, playerDef: e.playerDef };
            }
            return null;
        }

        // ── OFFICIAL 2026 DRAW (Dec 5, 2025) ──
        const GROUPS = {
            A: ['Mexico', 'South Africa', 'South Korea', 'Czech Republic'],
            B: ['Canada', 'Bosnia and Herzegovina', 'Qatar', 'Switzerland'],
            C: ['Brazil', 'Morocco', 'Haiti', 'Scotland'],
            D: ['USA', 'Paraguay', 'Australia', 'Turkey'],
            E: ['Germany', 'Curaçao', 'Ivory Coast', 'Ecuador'],
            F: ['Netherlands', 'Japan', 'Sweden', 'Tunisia'],
            G: ['Belgium', 'Egypt', 'Iran', 'New Zealand'],
            H: ['Spain', 'Cape Verde', 'Saudi Arabia', 'Uruguay'],
            I: ['France', 'Senegal', 'Iraq', 'Norway'],
            J: ['Argentina', 'Algeria', 'Austria', 'Jordan'],
            K: ['Portugal', 'DR Congo', 'Uzbekistan', 'Colombia'],
            L: ['England', 'Croatia', 'Ghana', 'Panama']
        };

        // One canonical display name per team (taken from the draw above) so a team shows the
        // SAME name everywhere — fixtures, group tables, match cards — no matter which spelling
        // ESPN sends. Any name not in the draw (e.g. knockout placeholders) is shown as-is.
        const TEAM_DISPLAY = {};
        for (const teams of Object.values(GROUPS)) {
            for (const n of teams) TEAM_DISPLAY[normalizeTeam(n)] = n;
        }
        function displayTeam(name) {
            return TEAM_DISPLAY[normalizeTeam(name)] || name;
        }

        // FIFA 2026 official venue names (commercial sponsors stripped).
        // Keyed by ESPN's venue.fullName.
        const FIFA_VENUE = {
            'AT&T Stadium': 'Dallas',
            'MetLife Stadium': 'New York',
            'Mercedes-Benz Stadium': 'Atlanta',
            'Arrowhead Stadium': 'Kansas City',
            'NRG Stadium': 'Houston',
            "Levi's Stadium": 'Bay Area',
            'SoFi Stadium': 'Los Angeles',
            'Lincoln Financial Field': 'Philadelphia',
            'Lumen Field': 'Seattle',
            'Gillette Stadium': 'Boston',
            'Hard Rock Stadium': 'Miami',
            'BMO Field': 'Toronto',
            'BC Place': 'Vancouver',
            'Estadio Azteca': 'Mexico City',
            'Estadio Banorte': 'Mexico City',
            'Estadio BBVA': 'Monterrey',
            'Estadio Monterrey': 'Monterrey',
            'Estadio Akron': 'Guadalajara',
            'Estadio Guadalajara': 'Guadalajara'
        };

        // ── BRACKET (R32 → Final, per FIFA 2026 published structure) ──
        const BRACKET_R32 = [
            { m: 73, home: '2A', away: '2B' },
            { m: 74, home: '1E', away: '3(A/B/C/D/F)' },
            { m: 75, home: '1F', away: '2C' },
            { m: 76, home: '1C', away: '2F' },
            { m: 77, home: '1I', away: '3(C/D/F/G/H)' },
            { m: 78, home: '2E', away: '2I' },
            { m: 79, home: '1A', away: '3(C/E/F/H/I)' },
            { m: 80, home: '1L', away: '3(E/H/I/J/K)' },
            { m: 81, home: '1D', away: '3(B/E/F/I/J)' },
            { m: 82, home: '1G', away: '3(A/E/H/I/J)' },
            { m: 83, home: '2K', away: '2L' },
            { m: 84, home: '1H', away: '2J' },
            { m: 85, home: '1B', away: '3(E/F/G/I/J)' },
            { m: 86, home: '1J', away: '2H' },
            { m: 87, home: '1K', away: '3(D/E/I/J/L)' },
            { m: 88, home: '2D', away: '2G' }
        ];
        const BRACKET_R16 = [
            { m: 89, from: [74, 77] },
            { m: 90, from: [73, 75] },
            { m: 91, from: [76, 78] },
            { m: 92, from: [79, 80] },
            { m: 93, from: [83, 84] },
            { m: 94, from: [81, 82] },
            { m: 95, from: [86, 88] },
            { m: 96, from: [85, 87] }
        ];
        const BRACKET_QF = [
            { m: 97, from: [89, 90] },
            { m: 98, from: [91, 92] },
            { m: 99, from: [93, 94] },
            { m: 100, from: [95, 96] }
        ];
        const BRACKET_SF = [
            { m: 101, from: [97, 98] },
            { m: 102, from: [99, 100] }
        ];
        const BRACKET_FINAL = { m: 104, from: [101, 102] };
        const BRACKET_THIRD = { m: 103, from: [101, 102] };  // losers

        // ── STATE ──
        const TZ = 'America/Chicago';   // Display all dates in Central time
        let teamOdds = {};
        let playerOdds = {};    // playerNameLower -> top-scorer probability
        let fixtures = [];
        let goalScorers = {};   // roster player name (lowercased) -> goals, for the Golden Boot cards
        let goalLeaders = [];   // [{name, goals}] every scorer, sorted desc, for the Top Scorers list
        let eliminatedTeams = new Set();  // normalized team names that are out of the tournament
        let openOwners = new Set(['Joe','Mike','Reed','Will','boot-Joe','boot-Mike','boot-Reed','boot-Will']);
        const CACHE_KEY_ESPN = 'wcp_espn_2026';
        const CACHE_KEY_POLY = 'wcp_poly_2026';
        const CACHE_KEY_BOOT = 'wcp_boot_2026';

        // ── CT TIMEZONE HELPERS ──
        function fmtDateCT(iso, opts) {
            if (!iso) return 'TBD';
            return new Date(iso).toLocaleDateString('en-US', Object.assign({ timeZone: TZ }, opts || { weekday: 'short', month: 'short', day: 'numeric' }));
        }
        function fmtTimeCT(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleTimeString('en-US', { timeZone: TZ, hour: 'numeric', minute: '2-digit' });
        }
        function fmtDateTimeCT(iso) {
            if (!iso) return 'TBD';
            return new Date(iso).toLocaleString('en-US', { timeZone: TZ, dateStyle: 'medium', timeStyle: 'short' }) + ' CT';
        }
        function ctDateKey(iso) {
            // YYYY-MM-DD in Central time, for grouping
            if (!iso) return 'TBD';
            const d = new Date(iso);
            const parts = new Intl.DateTimeFormat('en-US', { timeZone: TZ, year: 'numeric', month: '2-digit', day: '2-digit' }).formatToParts(d);
            const y = parts.find(p => p.type === 'year').value;
            const m = parts.find(p => p.type === 'month').value;
            const day = parts.find(p => p.type === 'day').value;
            return y + '-' + m + '-' + day;
        }

        // FIFA host city display (no "Stadium" suffix anywhere)
        function fifaCity(f) {
            return FIFA_VENUE[f.venue] || (f.venueCity || '').split(',')[0].trim() || '';
        }

        function fmtPct(p) {
            if (p == null || isNaN(p)) return '--';
            const pct = p * 100;
            if (pct < 0.1) return '<0.1%';
            if (pct < 1) return pct.toFixed(1) + '%';
            return pct.toFixed(0) + '%';
        }
        function fmtMoney(n) { return '$' + n.toString(); }
        function colorClass(o) { return OWNERS[o] ? 'team-' + OWNERS[o].color : ''; }
        function tagClass(o) { return OWNERS[o] ? 'tag-' + OWNERS[o].color : ''; }

        // ── DATA FETCH ──
        const ESPN_SCOREBOARD = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719';
        const POLY_WC_EVENT = 'https://gamma-api.polymarket.com/events?slug=world-cup-winner';
        const POLY_BOOT_EVENT = 'https://gamma-api.polymarket.com/events?slug=world-cup-golden-boot-winner';

        async function fetchESPN() {
            try {
                const resp = await fetch(ESPN_SCOREBOARD, { signal: AbortSignal.timeout(15000) });
                if (!resp.ok) throw new Error('ESPN ' + resp.status);
                const raw = await resp.json();
                try { localStorage.setItem(CACHE_KEY_ESPN, JSON.stringify({ ts: Date.now(), data: raw })); } catch(e) {}
                return raw;
            } catch (e) {
                try {
                    const c = JSON.parse(localStorage.getItem(CACHE_KEY_ESPN));
                    if (c && c.data) return c.data;
                } catch(_) {}
                return null;
            }
        }

        async function fetchPolymarket() {
            try {
                const resp = await fetch(POLY_WC_EVENT, { signal: AbortSignal.timeout(15000) });
                if (!resp.ok) throw new Error('Polymarket ' + resp.status);
                const raw = await resp.json();
                try { localStorage.setItem(CACHE_KEY_POLY, JSON.stringify({ ts: Date.now(), data: raw })); } catch(e) {}
                return raw;
            } catch (e) {
                try {
                    const c = JSON.parse(localStorage.getItem(CACHE_KEY_POLY));
                    if (c && c.data) return c.data;
                } catch(_) {}
                return null;
            }
        }

        async function fetchPolymarketBoot() {
            try {
                const resp = await fetch(POLY_BOOT_EVENT, { signal: AbortSignal.timeout(15000) });
                if (!resp.ok) throw new Error('Polymarket boot ' + resp.status);
                const raw = await resp.json();
                try { localStorage.setItem(CACHE_KEY_BOOT, JSON.stringify({ ts: Date.now(), data: raw })); } catch(e) {}
                return raw;
            } catch (e) {
                try {
                    const c = JSON.parse(localStorage.getItem(CACHE_KEY_BOOT));
                    if (c && c.data) return c.data;
                } catch(_) {}
                return null;
            }
        }

        function parseFixtures(raw) {
            if (!raw || !raw.events) return [];
            return raw.events.map(ev => {
                try {
                    const comp = (ev.competitions && ev.competitions[0]) || {};
                    const competitors = comp.competitors || [];
                    const home = competitors.find(c => c.homeAway === 'home') || competitors[0] || {};
                    const away = competitors.find(c => c.homeAway === 'away') || competitors[1] || {};
                    const homeTeam = home.team || {};
                    const awayTeam = away.team || {};
                    const status = (comp.status && comp.status.type) || {};
                    const homeName = homeTeam.displayName || homeTeam.name || '?';
                    const awayName = awayTeam.displayName || awayTeam.name || '?';
                    return {
                        id: ev.id,
                        date: ev.date,
                        name: ev.name || (homeName + ' vs ' + awayName),
                        homeName, awayName,
                        homeScore: home.score != null ? String(home.score) : '',
                        awayScore: away.score != null ? String(away.score) : '',
                        homeOwner: teamOwner(homeName),
                        awayOwner: teamOwner(awayName),
                        statusState: status.state || 'pre',
                        statusDetail: status.shortDetail || status.detail || '',
                        venue: (comp.venue && comp.venue.fullName) || '',
                        venueCity: (comp.venue && comp.venue.address && comp.venue.address.city) || '',
                        odds: comp.odds || [],
                        notes: comp.notes || []
                    };
                } catch (e) { return null; }
            }).filter(Boolean);
        }

        // Tally goal scorers from ESPN scoring plays. Own goals and shootout penalties
        // do NOT count toward the Golden Boot; in-match penalties do. Each goal detail
        // lists exactly the scorer in athletesInvolved[0] (verified — no assists mixed in).
        function parseGoalScorers(raw) {
            const leaders = {};   // displayNameLower -> { name, goals }
            const roster = {};    // roster player name (lowercased) -> goals
            if (raw && raw.events) {
                for (const ev of raw.events) {
                    const comp = (ev.competitions && ev.competitions[0]) || {};
                    for (const d of (comp.details || [])) {
                        if (!d.scoringPlay || d.ownGoal || d.shootout) continue;
                        const a = (d.athletesInvolved || [])[0];
                        const name = a && (a.displayName || a.fullName || a.shortName);
                        if (!name) continue;
                        (leaders[name.toLowerCase()] = leaders[name.toLowerCase()] || { name, goals: 0 }).goals++;
                        const m = matchPlayer(name);
                        if (m) {
                            const rk = m.playerDef.name.toLowerCase();
                            roster[rk] = (roster[rk] || 0) + 1;
                        }
                    }
                }
            }
            return { roster, leaders: Object.values(leaders).sort((a, b) => b.goals - a.goals) };
        }

        function parsePolymarket(raw) {
            const out = {};
            if (!raw || !raw[0]) return out;
            const markets = raw[0].markets || [];
            for (const m of markets) {
                if (!m.active || m.closed) continue;
                let prices, outcomes;
                try { prices = typeof m.outcomePrices === 'string' ? JSON.parse(m.outcomePrices) : m.outcomePrices; } catch(e) { continue; }
                try { outcomes = typeof m.outcomes === 'string' ? JSON.parse(m.outcomes) : m.outcomes; } catch(e) { continue; }
                if (!prices || !outcomes) continue;
                const yesIdx = outcomes.findIndex(o => /yes/i.test(o));
                if (yesIdx < 0) continue;
                const yesPrice = parseFloat(prices[yesIdx]);
                if (isNaN(yesPrice)) continue;
                const match = (m.question || '').match(/^Will\s+(.+?)\s+win/i);
                if (!match) continue;
                out[normalizeTeam(match[1].trim())] = yesPrice;
            }
            return out;
        }

        let playerOddsList = [];   // [{name, prob}] sorted by prob desc — for the Top Scorers section
        function parsePolymarketBoot(raw) {
            const out = {};
            playerOddsList = [];
            if (!raw || !raw[0]) return out;
            const markets = raw[0].markets || [];
            for (const m of markets) {
                if (!m.active || m.closed) continue;
                let prices, outcomes;
                try { prices = typeof m.outcomePrices === 'string' ? JSON.parse(m.outcomePrices) : m.outcomePrices; } catch(e) { continue; }
                try { outcomes = typeof m.outcomes === 'string' ? JSON.parse(m.outcomes) : m.outcomes; } catch(e) { continue; }
                if (!prices || !outcomes) continue;
                const yesIdx = outcomes.findIndex(o => /yes/i.test(o));
                if (yesIdx < 0) continue;
                const yesPrice = parseFloat(prices[yesIdx]);
                if (isNaN(yesPrice)) continue;
                const match = (m.question || '').match(/^Will\s+(.+?)\s+be\s+the\s+top/i);
                if (!match) continue;
                const playerName = match[1].trim();
                const key = playerName.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
                out[key] = yesPrice;
                playerOddsList.push({ name: playerName, prob: yesPrice });
            }
            playerOddsList.sort((a, b) => b.prob - a.prob);
            return out;
        }

        // Look up a player's Golden Boot prob — try exact and search-term matches
        function playerProb(player) {
            const norm = player.name.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
            if (playerOdds[norm] != null) return playerOdds[norm];
            // Try search terms (e.g. our roster's 'mbappe' against Polymarket's 'kylian mbappe')
            for (const s of player.search) {
                const sn = s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
                for (const [polyName, prob] of Object.entries(playerOdds)) {
                    if (polyName.includes(sn)) return prob;
                }
            }
            return 0;
        }

        // ── ELIMINATED TEAMS ──
        function isKnockoutMatch(f) {
            for (const n of (f.notes || [])) {
                const t = (n.headline || n.type || '').toLowerCase();
                if (t.includes('round of') || t.includes('quarter') || t.includes('semi')
                    || (t.includes('final') && !t.includes('group'))) return true;
            }
            return false;
        }
        function computeEliminated() {
            const out = new Set();
            // 1. Knockout losers — they're out, period
            for (const f of fixtures) {
                if (f.statusState !== 'post' || !isKnockoutMatch(f)) continue;
                const hs = parseInt(f.homeScore) || 0;
                const as = parseInt(f.awayScore) || 0;
                if (hs > as) out.add(normalizeTeam(f.awayName));
                else if (as > hs) out.add(normalizeTeam(f.homeName));
                // ESPN status detail will indicate winner via pen shootout if tied
            }
            // 2. Bottom of group once all 3 group games are played AND no longer at risk
            //    Conservative version: only mark 4th place if all 6 group games are done
            const groups = deriveGroups();
            for (const g of groups) {
                const fullyPlayed = g.teams.every(t => t.gp >= 3);
                if (!fullyPlayed) continue;
                // 4th place: always out
                if (g.teams[3]) out.add(normalizeTeam(g.teams[3].name));
                // 3rd place: TBD until best-3rds are decided across all groups, so leave alone
            }
            return out;
        }

        // ── ODDS CALC ──
        function teamProb(teamName) {
            return teamOdds[normalizeTeam(teamName)] || 0;
        }
        function sumAllNamedOdds() {
            let s = 0;
            for (const owner of Object.values(OWNERS)) {
                for (const t of owner.teams) {
                    if (t.isField) continue;
                    s += teamProb(t.name);
                }
            }
            return s;
        }
        function fieldProb() {
            return Math.max(0, 1 - sumAllNamedOdds());
        }
        function calcOwnerOdds(ownerName) {
            const o = OWNERS[ownerName];
            if (!o) return 0;
            let total = 0;
            for (const t of o.teams) {
                if (t.isField) total += fieldProb();
                else total += teamProb(t.name);
            }
            return total;
        }

        // ── RENDER: POOL STANDINGS ──
        function renderPoolStandings() {
            const el = document.getElementById('pool-standings');
            const entries = Object.entries(OWNERS).map(([name, o]) => ({

            el.innerHTML = entries.map((e, idx) => {

                    const prob = t.isField ? fieldProb() : teamProb(t.name);
                    const onclick = t.isField ? '' : `onclick='showTeam(${JSON.stringify(t.name)}); event.stopPropagation();'`;
                    const fieldCls = t.isField ? 'field-bucket' : '';

                    return `

                                <div class="owner-detail">${e.owner.teams.length} teams &middot; ${fmtMoney(totalSpent)} spent</div>
                            </div>
                            <div class="owner-stat">
                                <div class="owner-stat-value ${colorClass(e.name)}">${fmtPct(e.odds)}</div>

        // ── RENDER: GOLDEN BOOT ──
        function renderGoldenBoot() {
            const el = document.getElementById('golden-boot');
            const entries = Object.entries(OWNERS).map(([name, o]) => {
                const playerData = o.players.map(p => {
                    const goals = goalScorers[p.name.toLowerCase()] || 0;
                    const odds = playerProb(p);
                    return { name: p.name, goals, odds };
                });
                playerData.sort((a, b) => b.goals - a.goals || b.odds - a.odds);
                // Owner's combined boot probability = sum of his players' probabilities
                const combinedOdds = playerData.reduce((s, p) => s + (p.odds || 0), 0);
                return { name, owner: o, players: playerData, combinedOdds, topGoals: playerData[0] ? playerData[0].goals : 0 };
            });
            // The boot pool is won by owning the single top scorer (we don't sum an owner's
            // goals). Rank by each owner's leading scorer's goals, then by combined boot odds.
            entries.sort((a, b) => b.topGoals - a.topGoals || b.combinedOdds - a.combinedOdds);

            el.innerHTML = entries.map((e, idx) => {
                const rank = idx + 1;
                const isOpen = openOwners.has('boot-' + e.name);
                const playerRows = e.players.map(p => `
                    <div class="roster-row">
                        <div class="roster-flag">⚽</div>
                        <div class="roster-name">${p.name}</div>
                        <div class="roster-cost">${p.goals} G</div>
                        <div class="roster-stat">${fmtPct(p.odds)}</div>
                    </div>`).join('');
                const top = e.players[0];
                return `
                    <div class="owner-card ${isOpen ? 'open' : ''}" id="boot-card-${e.name}">
                        <div class="owner-header" onclick="toggleOwner('boot-${e.name}')">
                            <div class="owner-rank rank-${rank}">${rank}</div>
                            <div class="owner-info">
                                <div class="owner-name ${colorClass(e.name)}">${e.name}</div>
                                <div class="owner-detail">Top: ${top ? top.name + ' · ' + top.goals + 'G · ' + fmtPct(top.odds) : '—'}</div>
                            </div>
                            <div class="owner-stat">
                                <div class="owner-stat-value ${colorClass(e.name)}">${fmtPct(e.combinedOdds)}</div>
                                <div class="owner-stat-label">Boot Odds</div>
                            </div>
                            <span class="toggle-arrow">&#9660;</span>
                        </div>
                        <div class="owner-detail-panel">${playerRows}</div>
                    </div>`;
            }).join('');
        }

        // ── RENDER: GROUPS (hardcoded from official draw, tallied from fixture results) ──
        function deriveGroups() {
            // Build a quick lookup of each team's row, starting from the official draw
            const groups = Object.entries(GROUPS).map(([letter, teams]) => ({
                letter,
                teams: teams.map(name => ({ name, gp:0, w:0, d:0, l:0, gf:0, ga:0, pts:0 }))
            }));
            const teamRowByNorm = {};
            for (const g of groups) {
                for (const t of g.teams) teamRowByNorm[normalizeTeam(t.name)] = t;
            }
            // Tally completed fixtures
            for (const f of fixtures) {
                if (f.statusState !== 'post') continue;
                const home = teamRowByNorm[normalizeTeam(f.homeName)];
                const away = teamRowByNorm[normalizeTeam(f.awayName)];
                if (!home || !away) continue;  // not a group-stage match (knockout)
                const hs = parseInt(f.homeScore) || 0;
                const as = parseInt(f.awayScore) || 0;
                home.gp++; away.gp++;
                home.gf += hs; home.ga += as;
                away.gf += as; away.ga += hs;
                if (hs > as) { home.w++; home.pts += 3; away.l++; }
                else if (hs < as) { away.w++; away.pts += 3; home.l++; }
                else { home.d++; home.pts++; away.d++; away.pts++; }
            }
            // Sort each group by points → GD → GF
            for (const g of groups) {
                g.teams.forEach(t => t.gd = t.gf - t.ga);
                g.teams.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
            }
            return groups;
        }

        function renderGroups() {
            const el = document.getElementById('groups-list');
            const groups = deriveGroups();
            el.innerHTML = groups.map(g => {
                const rows = g.teams.map((t, idx) => {
                    const advancing = idx < 2;
                    const owner = teamOwner(t.name);
                    const tag = `<span class="fixture-team-tag ${tagClass(owner)}">${owner}</span>`;
                    const out = eliminatedTeams.has(normalizeTeam(t.name)) ? 'team-eliminated' : '';
                    return `
                        <div class="group-row ${advancing ? 'advancing' : ''} ${out}" onclick='showTeam(${JSON.stringify(t.name)})'>
                            <div class="group-pos">${idx + 1}</div>
                            <div class="group-team"><span class="group-team-name">${t.name}</span> ${tag}</div>
                            <div class="group-stat">${t.gp}</div>
                            <div class="group-stat">${t.gd >= 0 ? '+' + t.gd : t.gd}</div>
                            <div class="group-pts">${t.pts}</div>
                        </div>`;
                }).join('');
                return `
                    <div class="group-card">
                        <div class="group-header">
                            <span class="team-label">Group ${g.letter}</span>
                            <span>GP</span>
                            <span>GD</span>
                            <span>PTS</span>
                        </div>
                        ${rows}
                    </div>`;
            }).join('');
        }

        // ── MODALS ──
        function openModal(title, sub, body) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-sub').innerHTML = sub || '';
            document.getElementById('modal-body').innerHTML = body;
            document.getElementById('modal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('modal').classList.remove('open');
            document.body.style.overflow = '';
        }

        function showMatch(id) {
            const f = fixtures.find(x => x.id === id);
            if (!f) return;
            const isPost = f.statusState === 'post';
            const isLive = f.statusState === 'in';
            const showScore = isPost || isLive;

            const odds = f.odds && f.odds[0];
            const oddsHtml = odds ? `
                <div class="match-section">
                    <div class="match-section-title">Odds &middot; ${odds.provider ? odds.provider.displayName : ''}</div>
                    ${odds.homeTeamOdds && odds.homeTeamOdds.moneyLine != null ? '<div class="match-info-row"><div class="match-info-label">' + displayTeam(f.homeName) + '</div><div class="match-info-value">' + odds.homeTeamOdds.moneyLine + '</div></div>' : ''}
                    ${odds.drawOdds && odds.drawOdds.moneyLine != null ? '<div class="match-info-row"><div class="match-info-label">Draw</div><div class="match-info-value">' + odds.drawOdds.moneyLine + '</div></div>' : ''}
                    ${odds.awayTeamOdds && odds.awayTeamOdds.moneyLine != null ? '<div class="match-info-row"><div class="match-info-label">' + displayTeam(f.awayName) + '</div><div class="match-info-value">' + odds.awayTeamOdds.moneyLine + '</div></div>' : ''}
                    ${odds.overUnder ? '<div class="match-info-row"><div class="match-info-label">Total goals (O/U)</div><div class="match-info-value">' + odds.overUnder + '</div></div>' : ''}
                </div>` : '';

            const body = `
                <div class="match-score-block">
                    ${showScore ? `<div class="match-score-main">${f.homeScore || 0} &ndash; ${f.awayScore || 0}</div>` : '<div class="match-score-main" style="font-size:20px;color:var(--text-mid);">Scheduled</div>'}
                    <div class="match-score-status">${f.statusDetail || ''}</div>
                </div>
                <div class="match-section">
                    <div class="match-section-title">Match Info</div>
                    <div class="match-info-row"><div class="match-info-label">Date</div><div class="match-info-value">${fmtDateTimeCT(f.date)}</div></div>
                    ${fifaCity(f) ? '<div class="match-info-row"><div class="match-info-label">Host city</div><div class="match-info-value">' + fifaCity(f) + '</div></div>' : ''}
                    <div class="match-info-row"><div class="match-info-label">${displayTeam(f.homeName)}</div><div class="match-info-value">${f.homeOwner}</div></div>
                    <div class="match-info-row"><div class="match-info-label">${displayTeam(f.awayName)}</div><div class="match-info-value">${f.awayOwner}</div></div>
                </div>
                ${oddsHtml}`;

            openModal(displayTeam(f.homeName) + ' vs ' + displayTeam(f.awayName), (fifaCity(f) || 'Host TBD') + ' &middot; ' + (f.statusDetail || ''), body);
        }

        function showTeam(teamName) {
            const norm = normalizeTeam(teamName);
            const owner = teamOwner(teamName);
            const teamFixtures = fixtures.filter(f =>
                normalizeTeam(f.homeName) === norm || normalizeTeam(f.awayName) === norm
            ).sort((a, b) => (a.date || '').localeCompare(b.date || ''));

            const ownerDef = OWNERS[owner];
            const teamDef = ownerDef ? ownerDef.teams.find(t => normalizeTeam(t.name) === norm) : null;
            const cost = teamDef ? fmtMoney(teamDef.cost) : (isFieldTeam(teamName) ? 'part of Mike\'s Field' : '—');
            const prob = teamProb(teamName);

            const matchesHtml = teamFixtures.map(f => {
                const isPost = f.statusState === 'post';
                const isLive = f.statusState === 'in';
                const showScore = isPost || isLive;
                const oppHome = normalizeTeam(f.homeName) === norm;
                const opp = oppHome ? f.awayName : f.homeName;
                const teamScore = oppHome ? f.homeScore : f.awayScore;
                const oppScore = oppHome ? f.awayScore : f.homeScore;
                const dateStr = f.date ? fmtDateCT(f.date, { month: 'short', day: 'numeric' }) : 'TBD';
                let result = '';
                if (isPost) {
                    const tn = parseInt(teamScore)||0, on = parseInt(oppScore)||0;
                    result = tn > on ? 'W' : (tn < on ? 'L' : 'D');
                }
                return `
                    <div class="match-info-row">
                        <div class="match-info-label">${dateStr} &middot; ${oppHome ? 'vs' : '@'} ${displayTeam(opp)}</div>
                        <div class="match-info-value">${showScore ? (teamScore||0) + '–' + (oppScore||0) + ' ' + result : (f.statusDetail || fmtTimeCT(f.date))}</div>
                    </div>`;
            }).join('');

            const body = `
                <div class="match-section" style="margin-top:0;padding-top:0;border:none;">
                    <div class="match-info-row"><div class="match-info-label">Owner</div><div class="match-info-value">${owner}</div></div>
                    <div class="match-info-row"><div class="match-info-label">Auction cost</div><div class="match-info-value">${cost}</div></div>
                    <div class="match-info-row"><div class="match-info-label">Championship odds</div><div class="match-info-value">${fmtPct(prob)}</div></div>
                </div>
                <div class="match-section">
                    <div class="match-section-title">Fixtures</div>
                    ${matchesHtml || '<div class="empty-msg">No matches found.</div>'}
                </div>`;

            openModal(displayTeam(teamName), owner + (isFieldTeam(teamName) ? ' (Field)' : ''), body);
        }

        function showOwner(ownerName) {
            // Switch to games view & open that owner's pool card
            switchView('games');
            openOwners.add(ownerName);
            renderPoolStandings();
            setTimeout(() => {
                const card = document.getElementById('pool-card-' + ownerName);
                if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        // ── TABS ──
        function switchView(name) {
            document.querySelectorAll('.main-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.view === name));
            document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === name + '-view'));
        }
        document.addEventListener('click', e => {
            if (e.target.classList.contains('main-tab-btn')) {
                switchView(e.target.dataset.view);
            } else if (e.target.classList.contains('sub-tab-btn')) {
                document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById(e.target.dataset.sub + '-panel').classList.add('active');
            }
        });

        // ── MAIN ──
        async function fetchAll() {
            const spinner = document.getElementById('spinner');
            const refreshText = document.getElementById('refresh-text');
            spinner.style.display = 'inline-block';
            refreshText.textContent = 'Loading';

            const [espnRaw, polyRaw, bootRaw] = await Promise.all([
                fetchESPN(), fetchPolymarket(), fetchPolymarketBoot()
            ]);
            if (espnRaw) {
                fixtures = parseFixtures(espnRaw);
                eliminatedTeams = computeEliminated();
                const scorers = parseGoalScorers(espnRaw);
                goalScorers = scorers.roster;
                goalLeaders = scorers.leaders;
            }
            if (polyRaw) teamOdds = parsePolymarket(polyRaw);
            if (bootRaw) playerOdds = parsePolymarketBoot(bootRaw);

            renderPoolStandings();
            renderGoldenBoot();
            renderTopScorers();
            renderFixtures();
            renderGroups();
            renderBracket();

            const banner = document.getElementById('status-banner');
            if (!espnRaw && !polyRaw) {
                banner.className = 'status-banner';
                banner.textContent = 'Live data unavailable';
            } else if (!fixtures.length) {
                banner.className = 'status-banner';
                banner.textContent = 'Preview Mode — Tournament begins June 11, 2026';
            } else {
                banner.className = '';
                banner.textContent = '';
            }

            document.getElementById('last-updated').textContent =
                'Updated ' + fmtTimeCT(new Date().toISOString()) + ' CT';
            spinner.style.display = 'none';
            refreshText.textContent = 'Refresh';
        }

        // INIT
        fetchAll();
        let refreshInterval = setInterval(fetchAll, 60000);
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) clearInterval(refreshInterval);
            else { fetchAll(); refreshInterval = setInterval(fetchAll, 60000); }
        });
    </script>
</body>
</html>
